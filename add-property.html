<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Add Property</title>

<link rel="stylesheet" href="{{ url_for('static', filename='css/admin.css') }}">

</head>

<body>

<div class="dashboard">

<h1>Add New Property</h1>

<form class="property-form" method="POST" enctype="multipart/form-data">

<input type="text" name="title" placeholder="Property Title" required>

<input type="text" name="price" placeholder="Price" required>

<input type="text" name="location" placeholder="Location" required>

<label>Property Status</label>

<select name="type" required>
    <option value="sale">For Sale</option>
    <option value="rent">For Rent</option>
</select>

<input type="number" name="bedrooms" placeholder="Bedrooms">

<input type="number" name="bathrooms" placeholder="Bathrooms">

<input type="text" name="area" placeholder="Area (m²)">

<textarea name="description" placeholder="Description"></textarea>

<label>Upload Image</label>
<input type="file" name="image">

<label>Upload Video</label>
<input type="file" name="video">

<button type="submit">Save Property</button>

</form>

<br>

<a href="/admin/dashboard">⬅ Back to Dashboard</a>

</div>

</body>
</html>
